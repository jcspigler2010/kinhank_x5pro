# Flycast Dreamcast Controller Mapping — GameSir T3
# Deploy to: Android/data/com.flycast.emulator/files/data/mappings/SDL_GameSir-T3 2.4G Gamepad.cfg
# Filename format: SDL_{ControllerName}.cfg
#
# [digital] format: bindN = {input_index}:{dreamcast_button}
# [analog] format: bindN = {axis_index}{+/-}:{dreamcast_button}

[digital]
bind0 = 0:btn_a
bind1 = 1:btn_b
bind2 = 2:btn_x
bind3 = 3:btn_y
bind4 = 9:btn_start
bind5 = 11:btn_dpad1_up
bind6 = 12:btn_dpad1_down
bind7 = 13:btn_dpad1_left
bind8 = 14:btn_dpad1_right

[analog]
bind0 = 0-:btn_analog_left
bind1 = 0+:btn_analog_right
bind2 = 1-:btn_analog_up
bind3 = 1+:btn_analog_down
bind4 = 4+:btn_trigger_left
bind5 = 5+:btn_trigger_right

[emulator]
dead_zone = 10
mapping_name =
rumble_power = 100
version = 3
